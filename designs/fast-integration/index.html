<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fast Integration Process Card</title>
<style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #111111;
            --text-light: #ffffff;
            --text-dim: #a0a0a0;
            --accent-glow: rgba(220, 100, 30, 0.6);
            --accent-glow-strong: rgba(230, 120, 40, 0.8);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 40%, rgba(150, 60, 20, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 60%, rgba(180, 80, 25, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
        }

        .card-container {
            position: relative;
            width: 380px;
            max-width: 100%;
            min-height: 520px;
            border-radius: 40px;
            padding: 45px;
            background-color: #0d0d0d;
            background: linear-gradient(145deg, rgba(40, 40, 40, 0.4) 0%, rgba(10, 10, 10, 0.8) 50%, rgba(0, 0, 0, 0.9) 100%);
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.95),
                inset 0 1px 1px rgba(255, 255, 255, 0.3),
                inset 1px 1px 0px rgba(255, 255, 255, 0.1),
                inset -1px -1px 0px rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        /* Metallic Sheen / Surface Reflection */
        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 0%,
                rgba(255, 255, 255, 0.03) 45%,
                rgba(255, 255, 255, 0.08) 50%,
                rgba(255, 255, 255, 0.03) 55%,
                transparent 100%
            );
            transform: rotate(-20deg);
            pointer-events: none;
            z-index: 1;
        }

        /* The glassmorphism/glow effect at the bottom */
        .card-glow {
            position: absolute;
            bottom: -15%;
            right: -10%;
            width: 100%;
            height: 80%;
            background: radial-gradient(circle at 80% 90%, #ff8c00 0%, #ff4500 40%, transparent 80%);
            filter: blur(60px);
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: plus-lighter;
        }

        /* Subtle reflection line on top */
        .card-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.1),
                inset 0 -1px 1px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-wrapper i {
            font-size: 24px;
            color: #dcb394; /* slightly coppery tint */
            filter: drop-shadow(0 0 8px rgba(220, 179, 148, 0.3));
        }

        .svg-icon {
            width: 1em;
            height: 1em;
            fill: currentColor;
            vertical-align: -0.125em;
            flex-shrink: 0;
        }

        h2 {
            font-size: 36px;
            font-weight: 600;
            line-height: 1.2;
            margin: 0 0 20px 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 18px;
            line-height: 1.5;
            color: #d0d0d0;
            margin: 0 0 auto 0;
        }

        .learn-more {
            display: inline-flex;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            margin-top: 40px;
            transition: opacity 0.2s;
        }

        .learn-more:hover {
            opacity: 0.8;
        }

        .learn-more i,
        .learn-more .svg-icon {
            margin-left: 8px;
            font-size: 14px;
            font-weight: 300;
        }

    </style>
</head>
<body>
<div class="card-container">
<div class="card-glow"></div>
<div class="content">
<div class="icon-wrapper">
</div>
<h2>Örnektir Başlık<br/>Örnektir</h2>
<p>Bu bir örnek metindir, yazılımın hızlı<br/>
            entegrasyon sürecini ve veri kullanımını<br/>
            temsil eden bir açıklamadır...</p>
<a class="learn-more" href="#">Daha fazla bilgi <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" aria-hidden="true" focusable="false"><path d="M310.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-192 192c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L242.7 256 73.4 86.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l192 192z"/></svg></a>
</div>
</div>
</body>
</html>
