<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>3D Plate Stack Timer</title>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
        }

        .container {
            width: 320px;
            height: 320px;
            background-color: white;
            border-radius: 40px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transform: scale(0.75);
        }

        .visual-side {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 120px;
            perspective-origin: 50% 50%;
        }

        .stack-container {
            width: 70px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transform: scale(0.4);
        }

        .plate {
            width: 60px;
            height: 200px;
            background-color: #000;
            margin: -93px 0;
            transform-origin: center center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* 18 Plates with deeper 3D perspective to emphasize the rectangular receding shape */
        .plate:nth-child(1)  { transform: rotateX(72deg) scaleX(1); opacity: 0.04; }
        .plate:nth-child(2)  { transform: rotateX(75deg) scaleX(0.95); opacity: 0.06; }
        .plate:nth-child(3)  { transform: rotateX(78deg) scaleX(0.90); opacity: 0.10; }
        .plate:nth-child(4)  { transform: rotateX(80deg) scaleX(0.85); opacity: 0.15; }
        .plate:nth-child(5)  { transform: rotateX(82deg) scaleX(0.79); opacity: 0.20; }
        .plate:nth-child(6)  { transform: rotateX(84deg) scaleX(0.73); opacity: 0.30; }
        .plate:nth-child(7)  { transform: rotateX(86deg) scaleX(0.68); opacity: 0.45; }
        .plate:nth-child(8)  { transform: rotateX(88deg) scaleX(0.64); opacity: 0.65; }
        .plate:nth-child(9)  { transform: rotateX(89.5deg) scaleX(0.62); opacity: 0.88; }
        
        .plate:nth-child(10) { transform: rotateX(90.5deg) scaleX(0.62); opacity: 0.70; }
        .plate:nth-child(11) { transform: rotateX(92deg) scaleX(0.64); opacity: 0.45; }
        .plate:nth-child(12) { transform: rotateX(94deg) scaleX(0.68); opacity: 0.25; }
        .plate:nth-child(13) { transform: rotateX(96deg) scaleX(0.73); opacity: 0.12; }
        .plate:nth-child(14) { transform: rotateX(98deg) scaleX(0.79); opacity: 0.06; }
        .plate:nth-child(15) { transform: rotateX(100deg) scaleX(0.85); opacity: 0.03; }
        .plate:nth-child(16) { transform: rotateX(102deg) scaleX(0.90); opacity: 0.01; }
        .plate:nth-child(17) { transform: rotateX(105deg) scaleX(0.95); opacity: 0.00; }
        .plate:nth-child(18) { transform: rotateX(108deg) scaleX(1); opacity: 0.00; }

        .text-side {
            flex: 1;
            display: flex;
            padding: 20px 24px 20px 8px;
        }

        .timer-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 32px;
            overflow: hidden;
        }

        .minutes-box {
            flex: 1;
            background-color: #f2f2f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .seconds-box {
            flex: 1;
            background-color: #1c1c1e;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .number {
            font-size: 56px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 2px;
        }

        .label {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.5;
        }

        .seconds-box .label {
            color: #8e8e93;
            opacity: 1;
        }

        /* The two dots separator in the middle */
        .separator {
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-top {
            background-color: #000;
        }

        .dot-bottom {
            background-color: #fff;
        }

        /* Split circles decoration */
        .decoration-container {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .circle-pair {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .circle-half-white {
            height: 50%;
            background: #1c1c1e;
        }

        .circle-half-black {
            height: 50%;
            background: white;
        }

    </style>
</head>
<body>
<div class="container">
<div class="visual-side">
<div class="stack-container">
<!-- 18 independent plates -->
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
<div class="plate"></div>
</div>
</div>
<div class="text-side">
<div class="timer-card">
<div class="minutes-box">
<div class="number">20</div>
<div class="label">minutes</div>
<div class="decoration-container">
<div class="circle-pair">
<div class="circle-half-white"></div>
<div class="circle-half-black"></div>
</div>
<div class="circle-pair">
<div class="circle-half-white"></div>
<div class="circle-half-black"></div>
</div>
</div>
</div>
<div class="seconds-box">
<div class="number">24</div>
<div class="label">seconds</div>
</div>
</div>
</div>
</div>
</body>
</html>
