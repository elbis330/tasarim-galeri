<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=444, viewport-fit=cover">
<title>Feedback Card</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
    * { box-sizing: border-box; }
    html, body { width: 100%; }
    body {
      margin: 0;
      background: #4a4542;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #eee;
      overflow-x: hidden;
    }
    .svg-icon {
      width: 1em;
      height: 1em;
      vertical-align: middle;
      flex: none;
    }
    .scale-frame {
      width: 420px;
      
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-wrapper {
      position: relative;
      width: 420px;
      height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 440px) {
      .scale-frame { aspect-ratio: 420 / 560; height: auto; overflow: visible; }
      .card-wrapper {
        transform: scale(calc((100vw - 8px) / 420));
        transform-origin: center center;
      }
    }
    .card {
      width: 360px;
      height: 520px;
      background: #1e1b1a;
      border-radius: 34px;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.05), 0 20px 35px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 28px;
      position: relative;
    }
    .icon-bubble {
      width: 62px;
      height: 62px;
      background: #3f5f1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      box-shadow: inset 0 0 0 4px rgba(0,0,0,0.2);
    }
    .icon-bubble i,
    .icon-bubble .svg-icon {
      font-size: 26px;
      color: #8cd12f;
    }
    h1 {
      margin: 22px 0 10px;
      font-size: 30px;
      font-weight: 600;
      color: #f2f2f2;
    }
    .desc {
      text-align: center;
      font-size: 15px;
      color: #bcb5b2;
      line-height: 1.5;
      margin-bottom: 24px;
      width: 90%;
    }
    .rows {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-top: 6px;
    }
    .row {
      display: flex;
      gap: 14px;
      justify-content: center;
      width: 100%;
    }
    .pill {
      background: #2c2828;
      color: #ded6d3;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #2a2525;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      min-width: 105px;
      justify-content: center;
    }
    .pill.small { min-width: 95px; }
    .pill.wide { min-width: 145px; }
    .pill.active {
      background: #3d5c17;
      border: 1px solid #6e9722;
      color: #f1f6e9;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 0 0 1px rgba(0,0,0,0.2);
    }
    .pill i,
    .pill .svg-icon { color: #cfc7c4; }
    .pill.active i,
    .pill.active .svg-icon { color: #e6f2cf; }
    .hand {
      position: absolute;
      right: 80px;
      top: 330px;
      font-size: 30px;
      color: #ffffff;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.6));
    }
  </style>
</head>
<body>
