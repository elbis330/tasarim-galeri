<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=524, viewport-fit=cover">
<title>Profile Card</title>
<style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .svg-icon {
            width: 1em;
            height: 1em;
            vertical-align: middle;
            display: inline-block;
            flex: none;
        }

        .card-container {
            position: relative;
            width: 500px;
            
            border-radius: 24px;
        }

        .bottom-card {
            background-color: #9fe855;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            position: absolute;
            bottom: -50px; /* Offset to show below the top card */
            left: 0;
            right: 0;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px; /* Space for the top card */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .bottom-card-text {
            color: #000;
            font-weight: 500;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bottom-card-icon {
            background-color: #000;
            color: #9fe855;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        .top-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #222222 100%);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #a0a0a0;
            font-size: 14px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #9fe855;
            border-radius: 50%;
        }

        .time {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ccc;
        }

        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 500;
            color: #fff;
        }

        .profile-info p {
            margin: 0;
            color: #a0a0a0;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.1) 100%);
        }

        .btn .svg-icon {
            font-size: 16px;
            color: #fff;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="card-container">
<div class="bottom-card">
<div class="bottom-card-text">
<div class="bottom-card-icon">
<svg class="svg-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg>
</div>
                Örnektir Metin
            </div>
</div>
<div class="top-card">
<div class="header">
<div class="status">
<div class="status-dot"></div>
                    Örnektir Durum
                </div>
<div class="time">
<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
                    00:00
                </div>
</div>
<div class="profile-section">
<div class="profile-info">
<h1>Örnektir Başlık</h1>
<p>Örnektir Alt Başlık</p>
</div>
</div>
<div class="buttons">
<button class="btn">
<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                    Örnektir Buton
                </button>
<button class="btn">
<svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h8"/></svg>
                    Örnektir Buton
                </button>
</div>
</div>
</div>
</body>
</html>
